<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escort Babylon - Comments</title>

<style>
/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#e8e5bf;
line-height:1.4;
}

/* IMAGES */

img{
max-width:100%;
height:auto;
display:block;
}

/* PAGE CONTAINER */

.container{
width:95%;
max-width:750px;
margin:auto;
}

/* HEADER */

.header{
background:#0b0e3f;
display:flex;
justify-content:center;
align-items:center;
padding:10px;
}

.header img{
height:45px;
}

/* NAV BAR */

.nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
background:#c41212;
}

.nav a{
padding:10px 16px;
border-right:1px solid #880909;
}

.nav img{
height:22px;
}

.nav .active{
background:black;
}

/* COMMENT HEADER */

.comment-header{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:20px;
flex-wrap:wrap;
}

.comment-header img{
height:90px;
}

/* COMMENTS AREA */

.comments{
width:95%;
max-width:750px;
margin:auto;
padding-bottom:120px;
}

/* COMMENT CARD */

.comment-box{
background:#cbd7b9;
border-radius:14px;
padding:6px;
margin-bottom:18px;
box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

/* META TEXT */

.comment-meta{
font-weight:bold;
color:#7c8b6a;
padding:8px 15px;
font-size:24px;
}

/* COMMENT TEXT */

.comment-text{
background:#f3f3f3;
border-radius:10px;
padding:12px;
font-size:24px;
position:relative;
}

/* ACTION BUTTONS */

.actions{
position:absolute;
right:10px;
top:8px;
}

.actions a{
font-size:21px;
font-weight:bold;
padding:4px 7px;
border-radius:3px;
text-decoration:none;
margin-left:4px;
}

.delete{
background:#666;
color:white;
}

.report{
background:#ff3b3b;
color:white;
}

/* FOOTER BAR */

.comment-input{
position:fixed;
bottom:0;
left:0;
width:100%;
height:85px;
background:#d7d4ad;
display:flex;
align-items:center;
padding-left:10px;
z-index:999;
box-shadow:0 -3px 6px rgba(0,0,0,0.25);
}

/* BACK BUTTON */

.comment-input .back-btn{
height:30px;
margin-right:10px;
}

/* CENTER FOOTER IMAGE */

.comment-input .right-img{
position:center;
height:100%;
max-height:75px;
}

/* SMALL PHONES */

@media (max-width:480px){

.header img{
height:10px;
}

.nav img{
height:18px;
}

.comment-header img{
height:20px;
}

.comment-meta{
font-size:23px;
}

.comment-text{
font-size:23px;
}

.comment-input{
height:10px;
align-items:center;
}

.comment-input .back-btn{
height:10px;
}

.comment-input .right-img{
max-height:10px;
}

}

/* TABLETS */

@media (min-width:600px){

.comment-header{
flex-direction:row;
}

}

/* DESKTOP */

@media (min-width:900px){

.comments{
max-width:750px;
margin:auto;
}

.comment-box{
margin-bottom:20px;
}

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">
<img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover.png">
</div>

<!-- NAV -->

</div>

</body>
</html>
