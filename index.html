<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escort Babylon - Comments</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#e8e5bf;
line-height:1.4;
}

/* IMAGES */
img{
max-width:100%;
height:auto;
display:block;
}

/* HEADER */
.header{
background:#0b0e3f;
display:flex;
justify-content:center;
align-items:center;
padding:22px 16px;
}

.header img{
width:240px;
max-width:90%;
}

/* NAV */
.nav{
display:flex;
flex-wrap:nowrap;
justify-content:space-between;
align-items:center;
background:#c41212;
overflow-x:auto;
}

.nav a{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:10px 8px;
border-right:1px solid #880909;
}

.nav img{
height:50px;
}

/* COMMENT HEADER */
.comment-header{
display:flex;
align-items:center;
justify-content:center;
padding:20px 10px;
}

.comment-header img{
width:100%;
max-width:420px;
}

/* COMMENT FORM */
.comment-form{
width:95%;
max-width:750px;
margin:15px auto;
background:#cbd7b9;
padding:12px;
border-radius:10px;
}

.comment-form input,
.comment-form textarea{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:1px solid #aaa;
font-size:14px;
}

.comment-form button{
width:100%;
padding:10px;
background:#0b0e3f;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

/* COMMENTS AREA */
.comments{
width:95%;
max-width:750px;
margin:auto;
padding-bottom:120px;
}

/* COMMENT BOX */
.comment-box{
background:#cbd7b9;
border-radius:14px;
padding:6px;
margin-bottom:18px;
box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

.comment-meta{
font-weight:bold;
color:#7c8b6a;
padding:6px 12px;
font-size:16px;
}

.comment-text{
background:#f3f3f3;
border-radius:10px;
padding:12px;
font-size:16px;
position:relative;
}

/* BUTTONS */
.actions{
position:absolute;
right:6px;
bottom:6px;
}

.actions a{
font-size:12px;
font-weight:bold;
padding:4px 6px;
border-radius:3px;
text-decoration:none;
margin-left:4px;
}

.delete{
background:#666;
color:white;
}

.report{
background:#ff3b3b;
color:white;
}

/* FOOTER */
.comment-input{
position:fixed;
bottom:0;
left:0;
width:100%;
height:95px;
background:#d7d4ad;
display:flex;
align-items:center;
gap:8px;
padding:0 12px;
box-shadow:0 -3px 6px rgba(0,0,0,0.25);
}

.back-btn{
height:65px;
}

.right-img{
height:85px;
}

/* MOBILE */
@media (max-width:480px){

.header img{
width:260px;
}

.nav img{
height:36px;
}

.comment-input{
height:110px;
}

.back-btn{
height:70px;
}

.right-img{
height:100px;
}

}

</style>

</head>

<body>

<div class="header">
<img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover.png">
</div>

<div class="nav">
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(1).png"></a>
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(2).png"></a>
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(3).png"></a>
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(4).png"></a>
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(6).png"></a>
</div>

<div class="comment-header">
<img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(8).png">
</div>

<!-- COMMENT FORM -->

<div class="comment-form">
<input type="text" id="username" placeholder="Your name">
<textarea id="commentText" placeholder="Write a comment"></textarea>
<button onclick="addComment()">Add Comment</button>
</div>

<!-- COMMENTS LIST -->

<div class="comments" id="comments">

</div>

<div class="comment-input">
<img class="back-btn" src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/refs/heads/main/image-Picsart-BackgroundRemover%20(9).png">
<img class="right-img" src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/refs/heads/main/commentFooterWithFace-Picsart-BackgroundRemover.png">
</div>

<script>

function addComment(){

let name=document.getElementById("username").value.trim();
let text=document.getElementById("commentText").value.trim();

if(name=="" || text==""){
alert("Please enter name and comment");
return;
}

let date=new Date().toDateString();

let commentHTML=`
<div class="comment-box">
<div class="comment-meta">${date} - ${name}</div>
<div class="comment-text">
<div class="actions">
<a class="delete" href="#">DELETE</a>
<a class="report" href="#">REPORT</a>
</div>
${text}
</div>
</div>
`;

document.getElementById("comments").insertAdjacentHTML("afterbegin",commentHTML);

document.getElementById("username").value="";
document.getElementById("commentText").value="";
}

</script>

</body>
</html>
