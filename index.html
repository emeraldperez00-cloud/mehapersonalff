<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escort Babylon - Comments</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#e8e5bf;
line-height:1.4;
}

/* IMAGES */

img{
max-width:100%;
height:auto;
display:block;
}

/* HEADER */

.header{
background:#0b0e3f;
display:flex;
justify-content:center;
align-items:center;
padding:22px 16px;
}

.header img{
width:240px;
max-width:90%;
height:auto;
}

/* NAV */

.nav{
display:flex;
flex-wrap:nowrap;
justify-content:space-between;
align-items:center;
background:#c41212;
overflow-x:auto;
}

.nav a{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:10px 8px;
border-right:1px solid #880909;
}

.nav img{
height:60px;
width:auto;
}

.nav .active{
background:black;
}

/* COMMENT HEADER */

.comment-header{
display:flex;
align-items:center;
justify-content:center;
padding:20px 10px;
}

.comment-header img{
width:100%;
max-width:420px;
}

/* COMMENTS */

.comments{
width:95%;
margin:auto;
padding-bottom:120px;
}

/* COMMENT CARD */

.comment-box{
background:#cbd7b9;
border-radius:14px;
padding:6px;
margin-bottom:20px;
box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

/* META */

.comment-meta{
font-weight:bold;
color:#7c8b6a;
padding:6px 12px;
font-size:16px;
}

/* TEXT */

.comment-text{
background:#f3f3f3;
border-radius:10px;
padding:10px;
padding-bottom:30px;
font-size:16px;
position:relative;
}

/* BUTTONS */

.actions{
position:absolute;
right:6px;
bottom:6px;
}

.actions a{
font-size:13px;
font-weight:bold;
padding:4px 6px;
border-radius:3px;
text-decoration:none;
margin-left:4px;
}

.delete{
background:#666;
color:white;
}

.report{
background:#ff3b3b;
color:white;
}

/* FOOTER */

.comment-input{
position:fixed;
bottom:0;
left:0;
width:100%;
height:95px;
background:#d7d4ad;
display:flex;
align-items:center;
gap:8px;
padding:0 12px;
z-index:999;
box-shadow:0 -3px 6px rgba(0,0,0,0.25);
}

.back-btn{
height:65px;
}

.right-img{
height:85px;
}

/* MOBILE */

@media (max-width:480px){

.header img{
width:260px;
}

.nav img{
height:36px;
}

.comment-header img{
max-width:95%;
}

.comment-input{
height:110px;
}

.back-btn{
height:70px;
}

.right-img{
height:100px;
}

}

/* DESKTOP */

@media (min-width:900px){

.comments{
max-width:750px;
margin:auto;
}

.comment-meta{
font-size:22px;
}

.comment-text{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="header">
<img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover.png">
</div>

<div class="nav">
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(1).png"></a>
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(2).png"></a>
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(3).png"></a>
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(4).png"></a>
<a class="active" href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(6).png"></a>
</div>

<div class="comment-header">
<img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(8).png">
</div>

<div class="comments">

</body>
</html>
