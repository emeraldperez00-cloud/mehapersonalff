<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escort Babylon - Comments</title>

<style>
/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#e8e5bf;
line-height:1.4;
}

/* IMAGES */

img{
max-width:100%;
height:auto;
display:block;
}

/* PAGE CONTAINER */

.container{
width:100%;
max-width:750px;
margin:auto;
}

/* HEADER */

.header{
background:#0b0e3f;
display:flex;
justify-content:center;
align-items:center;
padding:22px 16px;   /* a little more space */
}

.header img{
width:240px;         /* bigger logo */
max-width:90%;
height:auto;
}

/* NAV BAR */

.nav{
display:flex;
flex-wrap:nowrap;      /* keep everything on one line */
justify-content:space-between;
align-items:center;
background:#c41212;
overflow-x:auto;       /* allows scroll if screen is very small */
}

.nav a{
flex:1;                /* evenly space buttons */
display:flex;
justify-content:center;
align-items:center;
padding:10px 8px;
border-right:1px solid #880909;
}

.nav img{
height:60px;           /* bigger images */
width:auto;
}

.nav .active{
background:black;
}

/* COMMENT HEADER */

.comment-header{
display:flex;
align-items:center;
justify-content:center;
padding:20px 10px;
}

.comment-header img{
width:100%;
max-width:420px;   /* makes it larger but controlled */
height:auto;
margin:auto;
}

/* COMMENTS AREA */

.comments{
width:95%;
margin:auto;
padding-bottom:110px;
}

/* COMMENT CARD */

.comment-box{
background:#cbd7b9;
border-radius:14px;
padding:6px;
margin-bottom:16px;
box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

/* META TEXT */

.comment-meta{
font-weight:bold;
color:#7c8b6a;
padding:6px 12px;
font-size:16px;
}

/* COMMENT TEXT */

.comment-text{
background:#f3f3f3;
border-radius:10px;
padding:10px;
font-size:16px;
position:relative;
}

/* ACTION BUTTONS */

.actions{
position:absolute;
right:1px;
bottom:-18px;   /* moves buttons lower inside the box */
}

.actions a{
font-size:13px;
font-weight:bold;
padding:4px 6px;
border-radius:3px;
text-decoration:none;
margin-left:4px;
}

.delete{
background:#666;
color:white;
}

.report{
background:#ff3b3b;
color:white;
}

/* FOOTER BAR */

.comment-input{
position:fixed;
bottom:0;
left:0;
width:100%;
height:95px;
background:#d7d4ad;
display:flex;
align-items:center;
justify-content:flex-start; /* keeps images together */
gap:8px;                    /* small space between them */
padding:0 12px;
z-index:999;
box-shadow:0 -3px 6px rgba(0,0,0,0.25);
}

/* BACK BUTTON */

.comment-input .back-btn{
height:65px;
width:auto;
}

/* RIGHT IMAGE */

.comment-input .right-img{
height:85px;
width:auto;
object-fit:contain;
}

/* TABLETS */

@media (max-width:480px){

.header img{
width:260px;   /* larger logo on phones */
}

}

.nav img{
height:36px;
}

.comment-header img{
max-width:95%;
}

.comment-input{
height:110px;
}

.comment-input .back-btn{
height:70px;
}

.comment-input .right-img{
height:100px;
}

}
/* DESKTOP */

@media (min-width:900px){

.comments{
max-width:750px;
margin:auto;
}

.comment-meta{
font-size:22px;
}

.comment-text{
font-size:22px;
}

}

</style>
</head>
