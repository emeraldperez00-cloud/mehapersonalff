<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escort Babylon - Comments</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#e8e5bf;
line-height:1.4;
}

/* HEADER */
.header{
background:#0b0e3f;
display:flex;
justify-content:center;
align-items:center;
padding:22px 16px;
}

.header img{
width:240px;
max-width:90%;
height:auto;
}

/* NAV */
.nav{
display:flex;
flex-wrap:nowrap;
justify-content:space-between;
align-items:center;
background:#c41212;
overflow-x:auto;
}

.nav a{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:10px 8px;
border-right:1px solid #880909;
}

.nav img{
height:60px;
}

/* COMMENT HEADER */
.comment-header{
display:flex;
align-items:center;
justify-content:center;
padding:20px 10px;
}

.comment-header img{
width:100%;
max-width:420px;
}

/* COMMENTS AREA */
.comments{
width:95%;
max-width:750px;
margin:auto;
padding-bottom:120px;
}

/* COMMENT BOX */
.comment-box{
background:#cbd7b9;
border-radius:14px;
padding:6px;
margin-bottom:20px;
box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

.comment-meta{
font-weight:bold;
color:#7c8b6a;
padding:6px 12px;
font-size:16px;
}

.comment-text{
background:#f3f3f3;
border-radius:10px;
padding:12px;
font-size:16px;
position:relative;
}

/* BUTTONS */
.actions{
position:absolute;
right:6px;
bottom:6px;
}

.actions a{
font-size:13px;
font-weight:bold;
padding:4px 6px;
border-radius:3px;
text-decoration:none;
margin-left:4px;
}

.delete{
background:#666;
color:white;
}

.report{
background:#ff3b3b;
color:white;
}

/* COMMENT FORM */
.comment-form{
width:95%;
max-width:750px;
margin:20px auto;
background:#cbd7b9;
padding:15px;
border-radius:12px;
}

.comment-form input,
.comment-form textarea{
width:100%;
margin-bottom:10px;
padding:8px;
font-size:14px;
border:1px solid #aaa;
border-radius:6px;
}

.comment-form button{
background:#0b0e3f;
color:white;
border:none;
padding:10px;
width:100%;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.comment-form button:hover{
background:#000;
}

</style>

</head>

<body>

<div class="header">
<img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover.png">
</div>

<div class="nav">
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(1).png"></a>
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(2).png"></a>
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(3).png"></a>
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(4).png"></a>
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(6).png"></a>
</div>

<div class="comment-header">
<img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(8).png">
</div>

<!-- COMMENT FORM -->

<div class="comment-form">
<input type="text" id="username" placeholder="Your name">
<textarea id="commentText" rows="3" placeholder="Write a comment"></textarea>
<button onclick="addComment()">Add Comment</button>
</div>

<!-- COMMENTS LIST -->

<div class="comments" id="commentsList">

<div class="comment-box">
<div class="comment-meta">Sample - User</div>
<div class="comment-text">
<div class="actions">
<a class="delete" href="#">DELETE</a>
<a class="report" href="#">REPORT</a>
</div>
Example comment already here.
</div>
</div>

</div>

<script>

function addComment(){

let name = document.getElementById("username").value.trim();
let text = document.getElementById("commentText").value.trim();

if(name === "" || text === ""){
alert("Please enter name and comment");
return;
}

let date = new Date();
let dateStr = date.toDateString();

let commentHTML = `
<div class="comment-box">
<div class="comment-meta">${dateStr} - ${name}</div>
<div class="comment-text">
<div class="actions">
<a class="delete" href="#">DELETE</a>
<a class="report" href="#">REPORT</a>
</div>
${text}
</div>
</div>
`;

document.getElementById("commentsList").insertAdjacentHTML("afterbegin", commentHTML);

document.getElementById("username").value="";
document.getElementById("commentText").value="";

}

</script>

</body>
</html>
