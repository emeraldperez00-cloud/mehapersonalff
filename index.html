<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escort Babylon - Comments</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#e8e5bf;
line-height:1.4;
}

/* HEADER */
.header{
background:#0b0e3f;
display:flex;
justify-content:center;
align-items:center;
padding:22px 16px;
}

.header img{
width:240px;
max-width:90%;
}

/* NAV */
.nav{
display:flex;
flex-wrap:nowrap;
justify-content:space-between;
align-items:center;
background:#c41212;
}

.nav a{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:10px;
border-right:1px solid #880909;
}

.nav img{
height:40px;
}

/* COMMENT HEADER */
.comment-header{
display:flex;
justify-content:center;
padding:20px 10px;
}

.comment-header img{
max-width:420px;
width:100%;
}

/* COMMENTS AREA */
.comments{
width:95%;
max-width:750px;
margin:auto;
padding-bottom:120px;
}

/* COMMENT BOX */
.comment-box{
background:#cbd7b9;
border-radius:14px;
padding:6px;
margin-bottom:20px;
box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

/* COMMENT META */
.comment-meta{
font-weight:bold;
color:#7c8b6a;
padding:8px 12px;
font-size:18px;
}

/* COMMENT TEXT */
.comment-text{
background:#f3f3f3;
border-radius:10px;
padding:12px;
font-size:18px;
position:relative;
}

/* BUTTONS */
.actions{
position:absolute;
right:8px;
bottom:8px;
}

.actions a{
font-size:12px;
font-weight:bold;
padding:4px 6px;
border-radius:3px;
text-decoration:none;
margin-left:4px;
}

.delete{
background:#666;
color:white;
}

.report{
background:#ff3b3b;
color:white;
}

/* FOOTER */
.comment-input{
position:fixed;
bottom:0;
left:0;
width:100%;
height:90px;
background:#d7d4ad;
display:flex;
align-items:center;
gap:8px;
padding:0 12px;
box-shadow:0 -3px 6px rgba(0,0,0,0.25);
}

.back-btn{
height:60px;
}

.right-img{
height:80px;
}

/* MOBILE */
@media (max-width:480px){

.header img{
width:260px;
}

.nav img{
height:36px;
}

.comment-meta{
font-size:16px;
}

.comment-text{
font-size:16px;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

</div>

<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(2).png"></a>
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(3).png"></a>
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(4).png"></a>
<a href="#"><img src="https://raw.githubusercontent.com/emeraldperez00-cloud/img/main/image-Picsart-BackgroundRemover%20(6).png"></a>
</div>

<!-- COMMENT HEADER -->

</div>

</body>
